<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR PC SERVICES STORE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: radial-gradient(circle at top,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
padding:15px;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
background:#111827;
padding:20px;
border-radius:15px;
box-shadow:0 15px 50px rgba(0,0,0,0.6);
}

h2{
text-align:center;
color:#38bdf8;
}

.subtitle{
text-align:center;
font-size:12px;
color:#94a3b8;
margin-bottom:10px;
}

label{
font-size:13px;
color:#cbd5e1;
margin-top:10px;
display:block;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.send{
background:#22c55e;
color:white;
}

.admin{
background:#2563eb;
color:white;
}

.delete{
background:red;
color:white;
}

.card{
background:#1e293b;
padding:10px;
margin-top:10px;
border-radius:10px;
font-size:13px;
}

.stats{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
color:#38bdf8;
font-size:13px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>MR PC SERVICES STORE</h2>
<div class="subtitle">Boutique digitale</div>

<!-- FORM -->
<div id="form">

<label>Réseau</label>
<select id="network">
<option>Vodacom</option>
<option>Airtel</option>
<option>Orange</option>
<option>Africell</option>
</select>

<label>Type</label>
<select id="type">
<option>Forfaits Internet</option>
<option>Forfaits Appels</option>
<option>Forfaits SMS</option>
</select>

<label>Prix (CDF)</label>
<input type="number" id="amount" placeholder="Ex: 5000">

<label>Numéro client</label>
<input type="text" id="number" placeholder="097XXXXXXX">

<button class="send" onclick="sendOrder()">💬 Envoyer WhatsApp</button>

</div>

<!-- ADMIN -->
<button class="admin" onclick="loginAdmin()">🔐 Mode Admin</button>

<div id="adminPanel" class="hidden">

<div class="stats" id="stats"></div>

<div id="list"></div>

<button class="delete" onclick="clearAll()">🗑 Vider tout</button>

</div>

</div>

<script>

const myNumber = "243976133785";

function sendOrder(){

let n=document.getElementById("network").value;
let t=document.getElementById("type").value;
let a=document.getElementById("amount").value;
let num=document.getElementById("number").value;

if(!a || !num){
alert("Remplis tous les champs");
return;
}

let msg =
`📦 Nouvelle commande MR PC SERVICES STORE

📡 Réseau : ${n}
📦 Type : ${t}
💰 Prix : ${a} CDF
📱 Numéro : ${num}`;

window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`);

// SAVE
let data = JSON.parse(localStorage.getItem("orders")||"[]");
data.push({
n,t,a,num,
date:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(data));

load();

}

function loginAdmin(){
let pass = prompt("Mot de passe admin ?");

if(pass === "1234"){
document.getElementById("adminPanel").classList.toggle("hidden");
load();
}else{
alert("Accès refusé ❌");
}
}

function load(){

let data = JSON.parse(localStorage.getItem("orders")||"[]");

let list=document.getElementById("list");
list.innerHTML="";

let total=0;

data.forEach((o,i)=>{
total += Number(o.a);

list.innerHTML += `
<div class="card">
📡 ${o.n}<br>
📦 ${o.t}<br>
💰 ${o.a} CDF<br>
📱 ${o.num}<br>
🕒 ${o.date}
</div>
`;
});

document.getElementById("stats").innerHTML =
`📊 Commandes : ${data.length}<br>
💰 Total ventes : ${total} CDF`;

}

function clearAll(){
localStorage.removeItem("orders");
load();
}

load();

</script>

</body>
</html>
