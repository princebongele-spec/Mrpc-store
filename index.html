<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR PC SERVICES STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
margin:0;
font-family:Inter;
background:#0b0f1a;
color:white;
}

.container{
max-width:450px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:20px;
margin-bottom:15px;
border:1px solid #222;
}

/* LOGO */
.logo{
text-align:center;
font-size:28px;
font-weight:800;
display:flex;
align-items:center;
justify-content:center;
gap:10px;

background: linear-gradient(90deg, #3b82f6, #10b981, #60a5fa);
background-size: 300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation: gradientMove 4s ease infinite, glow 2s ease-in-out infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes glow{
0%,100%{text-shadow:0 0 5px #3b82f6; transform:scale(1);}
50%{text-shadow:0 0 20px #10b981; transform:scale(1.03);}
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:12px;
border:1px solid #333;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
opacity:0.9;
}

.btn-send{background:#10b981;color:white;}
.btn-admin{background:#3b82f6;color:white;}
.btn-danger{background:#ef4444;color:white;}

.hidden{display:none;}

.order{
background:#0f172a;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #222;
font-size:14px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#10b981;
padding:10px 20px;
border-radius:10px;
color:white;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
<i class="fas fa-store"></i> MR PC STORE
</div>

<form id="orderForm">

<label>Nom du client</label>
<input type="text" id="name" placeholder="Ex: Elias prince">

<label>Réseau</label>
<select id="network">
<option>Vodacom</option>
<option>Airtel</option>
<option>Orange</option>
<option>Africell</option>
</select>

<label>Type</label>
<select id="type">
<option>Internet</option>
<option>Appels</option>
<option>SMS</option>
</select>

<label>Prix (CDF)</label>
<input type="number" id="amount" placeholder="Ex: 500">

<label>Numéro du client</label>
<input type="tel" id="number" placeholder="097XXXXXXX">

<button type="button" class="btn-send" onclick="sendOrder()">
📲 Envoyer WhatsApp
</button>

</form>

<button class="btn-admin" onclick="loginAdmin()">
🔐 Admin
</button>

</div>

<!-- ADMIN -->
<div id="adminPanel" class="card hidden">

<h3>📊 Admin Panel</h3>
<div id="stats"></div>
<div id="list"></div>

<button class="btn-danger" onclick="clearAll()">🗑 Tout supprimer</button>

</div>

</div>

<script>

/* ⚠️ MET TON NUMÉRO WHATSAPP ICI (format international sans 0) */
const myNumber = "243976133785";

/* VALIDATION */
function validatePhone(num){
return /^[0-9]{9,12}$/.test(num);
}

/* TOAST */
function showToast(msg){
const div = document.createElement("div");
div.className = "toast";
div.textContent = msg;
document.body.appendChild(div);
setTimeout(()=>div.remove(),2000);
}

/* ENVOI */
function sendOrder(){

const name = document.getElementById("name").value;
const network = document.getElementById("network").value;
const type = document.getElementById("type").value;
const amount = document.getElementById("amount").value;
const number = document.getElementById("number").value;

if(!name || !amount || !number){
alert("Remplis tous les champs");
return;
}

if(!validatePhone(number)){
alert("Numéro invalide");
return;
}

const msg =
`📦 NOUVELLE COMMANDE
👤 Nom: ${name}
📡 Réseau: ${network}
📦 Type: ${type}
💰 Prix: ${amount} CDF
📱 Num: ${number}`;

window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`);

/* SAVE SAFE */
let data = JSON.parse(localStorage.getItem("orders"));
if(!Array.isArray(data)) data = [];

data.push({name,network,type,amount,number,date:new Date().toLocaleString()});
localStorage.setItem("orders",JSON.stringify(data));

showToast("Commande envoyée ✅");

document.getElementById("orderForm").reset();
load();
}

/* ADMIN LOGIN */
function loginAdmin(){
const pass = prompt("Mot de passe admin:");

if(pass==="1234"){
document.getElementById("adminPanel").classList.remove("hidden");
load();
}else{
alert("Accès refusé");
}
}

/* LOAD */
function load(){
let data = JSON.parse(localStorage.getItem("orders"));
if(!Array.isArray(data)) data = [];

document.getElementById("stats").innerHTML =
"📦 Total commandes: " + data.length;

let list = document.getElementById("list");
list.innerHTML = "";

data.forEach(o=>{
list.innerHTML += `
<div class="order">
👤 ${o.name}<br>
📡 ${o.network}<br>
📦 ${o.type}<br>
💰 ${o.amount} CDF<br>
📱 ${o.number}<br>
🕒 ${o.date}
</div>
`;
});
}

/* CLEAR */
function clearAll(){
localStorage.removeItem("orders");
load();
showToast("Tout supprimé 🗑");
}

load();

</script>

</body>
</html>
